<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="./manifest.json">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sport</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f4f4;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
    }

    .score {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
        padding: 10px;
        background: #fff;
        border-radius: 8px;
    }

    .title {
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .btn {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        cursor: pointer;
        background: #f7f7f7;
    }

    .card {
        background: white;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .time {
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        gap: 10px;
    }

    .time-edit-input {
        padding: 4px;
        border: 1px solid #ddd;
        border-radius: 6px;
        width: 140px;
    }

    .time-actions {
        display: flex;
        gap: 5px;
    }

    .time-actions button {
        padding: 3px 6px;
        font-size: 11px;
        border: 1px solid #ddd;
        border-radius: 4px;
        cursor: pointer;
    }

    .status-row {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }

    .status-box {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
        display: flex;
        justify-content: space-between;
    }

    .notes {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #eee;
    }

    .note-item {
        display: flex;
        justify-content: space-between;
        padding: 6px;
        margin-bottom: 5px;
        background: #fafafa;
        border-radius: 6px;
        font-size: 13px;
    }

    .note-item button {
        border: none;
        background: #333;
        color: #fff;
        padding: 4px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
    }

    .note-input {
        display: flex;
        gap: 6px;
        margin-top: 8px;
    }

    .note-input input {
        flex: 1;
        padding: 6px;
        border: 1px solid #ddd;
        border-radius: 6px;
    }

    .note-input button {
        padding: 6px 10px;
        border: 1px solid #ddd;
        background: #eee;
        border-radius: 6px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="container">

    <div class="title">Sport</div>
    <br>

    <div id="score" class="score"></div>

    <br>

    <div class="top-bar">
        <button class="btn" onclick="resetWeekEmojis()">Effacer emoji</button>
        <button class="btn" onclick="resetAll()">Réinitialiser tout</button>
        <button class="btn" onclick="undoLastAction()">Retour</button>
    </div>

    <br>

    <div id="blocks"></div>
</div>

<script>

const DEFAULT_NOTES_BY_BLOCK = {
    "05:00–09:00": [
        "Réagir rapidement après le signal",
        "Échauffement",
        "10 pompes",
        "5 dips",
        "15 squats",
        "10 fentes",
        "1 min planche",
        "40 sec mountain climber",
        "5 burpees",
        "Se laver"
    ],
    "13:00–15:40": [
        "Réagir rapidement après le signal",
        "12 pompes",
        "7 dips",
        "17 squats",
        "12 fentes",
        "1 min planche",
        "40 sec mountain climber",
        "7 burpees"
    ],
    "15:40–18:20": [
        "Réagir rapidement après le signal",
        "12 pompes",
        "7 dips",
        "17 squats",
        "12 fentes",
        "1 min planche",
        "40 sec mountain climber",
        "7 burpees"
    ],
    "18:20–19:50": [
        "Réagir rapidement après le signal",
        "Course + cardio",
        "4×8-12 tractions",
        "Travail avec matériel"
    ],
    "19:50–23:00": [
        "Réagir rapidement ou attendre",
        "12 pompes",
        "7 dips",
        "17 squats",
        "12 fentes",
        "1 min planche",
        "40 sec mountain climber",
        "7 burpees"
    ]
};

const BLOCKS = [
"05:00–09:00",
"13:00–15:40",
"15:40–18:20",
"18:20–19:50",
"19:50–23:00"
];

const STATE_KEY = "routine_state";
const EMOJI_KEY = "routine_emojis";
const SCORE_KEY = "routine_score";
const NOTES_KEY = "routine_notes";
const HISTORY_KEY = "routine_history";

/* STORAGE */
function load(key, fallback){
    return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
}
function save(key, value){
    localStorage.setItem(key, JSON.stringify(value));
}

/* SCORE */
function getScore(){
    return load(SCORE_KEY,{fort:0,faible:0});
}

function updateScore(type){
    const s = getScore();
    s[type]++;
    save(SCORE_KEY,s);
}

function addEmoji(block, emoji){
    const e = load(EMOJI_KEY,{});
    if(!e[block]) e[block]=[];
    e[block].push(emoji);
    save(EMOJI_KEY,e);
}

/* NOTES */
function getNotes(blockIndex){
    const notes = load(NOTES_KEY,{});
    const blockName = BLOCKS[blockIndex];

    if(!notes[blockIndex]){
        notes[blockIndex] = [...(DEFAULT_NOTES_BY_BLOCK[blockName] || [])];
        save(NOTES_KEY, notes);
    }

    return notes[blockIndex];
}

/* STATUS */
function setStatus(block,value){
    const state = load(STATE_KEY,{});
    const history = load(HISTORY_KEY,[]);

    state[block]=value;

    const action = {
        block,
        value,
        timestamp: Date.now()
    };

    history.push(action);

    if(value==="Fort") updateScore("fort");
    else updateScore("faible");

    addEmoji(block,value==="Fort"?"✅":"❌");

    save(STATE_KEY,state);
    save(HISTORY_KEY,history);

    render();
}

/* UNDO */
function undoLastAction(){
    const history = load(HISTORY_KEY,[]);
    if(history.length === 0) return;

    const last = history.pop();

    const score = getScore();
    const emojis = load(EMOJI_KEY,{});
    const state = load(STATE_KEY,{});

    if(last.value === "Fort" && score.fort > 0) score.fort--;
    if(last.value === "Faible" && score.faible > 0) score.faible--;

    if(emojis[last.block] && emojis[last.block].length > 0){
        emojis[last.block].pop();
    }

    delete state[last.block];

    save(SCORE_KEY, score);
    save(EMOJI_KEY, emojis);
    save(STATE_KEY, state);
    save(HISTORY_KEY, history);

    render();
}

/* RESET */
function resetWeekEmojis(){
    localStorage.removeItem(EMOJI_KEY);
    render();
}

function resetAll(){
    localStorage.clear();
    render();
}

/* BLOCKS */
function getActiveBlocks(){
    const custom = load("routine_blocks_custom", null);
    return custom || BLOCKS;
}

/* TIME EDIT */
function enableTimeEdit(el, index){
    const input = document.createElement("input");
    input.className = "time-edit-input";
    input.value = el.innerText;

    const actions = document.createElement("div");
    actions.className = "time-actions";

    const btnOk = document.createElement("button");
    btnOk.innerText = "Valider";

    const btnCancel = document.createElement("button");
    btnCancel.innerText = "Annuler";

    btnOk.onclick = () => {
        const blocks = getActiveBlocks();
        blocks[index] = input.value;
        localStorage.setItem("routine_blocks_custom", JSON.stringify(blocks));
        render();
    };

    btnCancel.onclick = () => render();

    actions.appendChild(btnOk);
    actions.appendChild(btnCancel);

    el.replaceWith(input);
    input.parentNode.appendChild(actions);
}

document.addEventListener("click",(e)=>{
    if(e.target.dataset && e.target.dataset.time==="true"){
        enableTimeEdit(e.target, parseInt(e.target.dataset.index));
    }
});

/* DELETE NOTE */
function deleteNote(btn){
    const item = btn.closest(".note-item");

    const blockIndex = parseInt(item.dataset.blockIndex);
    const noteIndex = parseInt(item.dataset.noteIndex);

    const notes = load(NOTES_KEY,{});

    if(!notes[blockIndex]) return;

    notes[blockIndex].splice(noteIndex,1);
    save(NOTES_KEY,notes);

    render();
}

/* ADD NOTE */
function addNoteUI(blockIndex){
    const input = document.getElementById("input-"+blockIndex);
    const v = input.value.trim();
    if(!v) return;

    const notes = load(NOTES_KEY,{});
    if(!notes[blockIndex]) notes[blockIndex]=[...(DEFAULT_NOTES_BY_BLOCK[BLOCKS[blockIndex]] || [])];

    notes[blockIndex].push(v);
    save(NOTES_KEY,notes);

    render();
}

/* RENDER */
function render(){
    const container = document.getElementById("blocks");
    const score = getScore();
    const emojis = load(EMOJI_KEY,{});
    const blocks = getActiveBlocks();

    container.innerHTML = "";

    blocks.forEach((block,index)=>{

        const notes = getNotes(index);
        const history = emojis[block] || [];

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="time">
                <span data-time="true" data-index="${index}">${block}</span>
                <span>${history.map(e=>`<span>${e}</span>`).join(" ")}</span>
            </div>

            <div class="status-row">
                <div class="status-box">
                    <span>Fort <span>✅</span></span>
                    <input type="checkbox" onchange="setStatus('${block}','Fort')">
                </div>

                <div class="status-box">
                    <span>Faible <span>❌</span></span>
                    <input type="checkbox" onchange="setStatus('${block}','Faible')">
                </div>
            </div>

            <div class="notes">
                ${notes.map((n,i)=>`
                    <div class="note-item" data-block-index="${index}" data-note-index="${i}">
                        <span>${n}</span>
                        <button onclick="deleteNote(this)">note${i+1}</button>
                    </div>
                `).join("")}

                <div class="note-input">
                    <input id="input-${index}" type="text">
                    <button onclick="addNoteUI(${index})">Ajouter</button>
                </div>
            </div>
        `;

        container.appendChild(card);
    });

    document.getElementById("score").innerHTML =
        `🏆 Score : ✅ ${score.fort} - ❌ ${score.faible}`;
}

render();

navigator.serviceWorker.register("service-worker.js", {
    scope: "./"
});

location.href
location.origin
</script>

</body>
</html>
